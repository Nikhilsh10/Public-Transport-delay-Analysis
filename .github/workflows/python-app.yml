name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Dependency caching ────────────────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install project requirements (excludes streamlit to keep CI fast)
          pip install pandas "scikit-learn==1.7.2" "joblib==1.3.2" matplotlib
          # Install test runner
          pip install pytest pytest-cov

      # ── Lint (non-blocking) ───────────────────────────────────────────────
      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop the build on syntax errors or undefined names
          flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
          # Exit-zero treats all other errors as warnings
          flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      # ── Tests ─────────────────────────────────────────────────────────────
      - name: Test with pytest
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

      # ── Coverage report (optional artifact) ───────────────────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7
